name: Ashaq Pro Auto Post

on:
  schedule:
    # تشغيل تلقائي كل 30 دقيقة (نشر سيرفرين في كل دورة)
    - cron: '*/30 * * * *'
  workflow_dispatch: # يسمح لك بتشغيل البوت يدوياً في أي وقت للتجربة

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Ashaq Script
        env:
          # تأكد أن اسم السر في الإعدادات هو BOT_TOKEN بالضبط
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python script.py
