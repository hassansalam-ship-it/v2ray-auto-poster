name: V2Ray Hunter v5 - 45min Cycle

on:
  schedule:
    - cron: '*/45 * * * *'
  workflow_dispatch:

jobs:
  hunt_and_post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install requests urllib3 websocket-client

      - name: Run Hunter
        env:
          BOT_TOKEN:  ${{ secrets.BOT_TOKEN }}
          ADMIN_TG:   "@genie_2000"
        run: python v2ray_hunter.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name  "GitHub Action Bot"
          git reset HEAD || true
          git checkout -- . 2>/dev/null || true
          git add sub_link.txt v2ray_hunt.log 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "✅ No changes to commit — skipping push"
            exit 0
          fi
          git commit -m "🔄 Auto-update: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git pull --rebase -X ours origin main 2>/dev/null || \
          git pull --rebase -X ours origin master 2>/dev/null || true
          git push origin HEAD:main 2>/dev/null || \
          git push origin HEAD:master 2>/dev/null || \
          (sleep 5 && git push origin HEAD:main) || \
          echo "⚠️ Push failed — will retry next cycle"