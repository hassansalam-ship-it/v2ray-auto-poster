name: V2Ray Hunter v5 - 45min Cycle

on:
  schedule:
    - cron: '*/45 * * * *'
  workflow_dispatch:

jobs:
  hunt_and_post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python (NO cache to avoid requirements.txt error) ─────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Install Dependencies directly ─────────────────────────
      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install requests urllib3

      # ── 4. Run Hunter ────────────────────────────────────────────
      - name: Run Hunter Script
        env:
          BOT_TOKEN:  ${{ secrets.BOT_TOKEN }}
          CUSTOM_SNI: "www.speedtest.net"
          ADMIN_TG:   "@genie_2000"
        run: python v2ray_hunter.py

      # ── 5. Commit & Push ─────────────────────────────────────────
      - name: Commit and Push Results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name  "GitHub Action Bot"

          # Clear any index/staging conflicts
          git reset HEAD || true
          git checkout -- . 2>/dev/null || true

          # Stage output files only
          git add sub_link.txt v2ray_hunt.log 2>/dev/null || true

          # Skip if nothing changed
          if git diff --cached --quiet; then
            echo "✅ No changes to commit — skipping push"
            exit 0
          fi

          git commit -m "🔄 Auto-update: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

          # Rebase on remote, prefer local on conflict
          git pull --rebase -X ours origin main 2>/dev/null || \
          git pull --rebase -X ours origin master 2>/dev/null || true

          # Push with retry
          git push origin HEAD:main 2>/dev/null || \
          git push origin HEAD:master 2>/dev/null || \
          (sleep 5 && git push origin HEAD:main) || \
          echo "⚠️ Push failed — will retry next cycle"
