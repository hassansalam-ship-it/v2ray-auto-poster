      - name: Commit & Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          
          # 1. إضافة الملفات التي تم إنشاؤها أو تعديلها بواسطة السكربت
          git add sub_link.txt v2ray_hunt.log learned_sources.json source_stats.json || true
          
          # 2. التحقق إذا كانت هناك ملفات مضافة فعلاً للـ Commit
          if git diff --cached --quiet; then
            echo "لا توجد تغييرات جديدة لنشرها"
          else
            # 3. سحب التحديثات من السيرفر مع إعطاء الأولوية لملفات السكربت المحلية
            git pull --rebase -X ours origin main
            
            # 4. حفظ التغييرات والرفع
            git commit -m "Update links: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin main
          fi
