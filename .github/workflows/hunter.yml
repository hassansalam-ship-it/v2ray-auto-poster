name: V2Ray Hunter v4 - 45min Cycle

on:
  schedule:
    - cron: '*/45 * * * *'
  workflow_dispatch:

jobs:
  hunt_and_post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # لضمان جلب التاريخ الكامل وتجنب مشاكل الـ Rebase

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Hunter Script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CUSTOM_SNI: ""
          ADMIN_TG: "@genie_2000"
        run: python v2ray_hunter.py

      - name: Commit & Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          
          # إضافة جميع الملفات الناتجة عن السكربت
          git add sub_link.txt v2ray_hunt.log learned_sources.json source_stats.json || true
          
          # تحقق إذا كان هناك تغييرات حقيقية قبل المتابعة
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            # سحب التغييرات مع استخدام Rebase لتفادي تعارض النسخ
            git pull --rebase origin main
            git commit -m "Update links: $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin main
          fi
