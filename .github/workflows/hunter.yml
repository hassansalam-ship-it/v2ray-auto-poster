name: V2Ray AI Hunter v10

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      sni:
        description: 'Bug Host SNI'
        required: false
        default: ''
      dry_run:
        description: 'Dry Run'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      force_fresh:
        description: 'Delete cache and rescan'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 22
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: v10-pip-v3

      - name: Install
        run: pip install requests urllib3 --quiet

      - name: Verify files
        run: |
          echo "=== Repo contents ==="
          ls -la
          echo "=== Python file check ==="
          if [ -f v2ray_hunter.py ]; then
            echo "OK: v2ray_hunter.py found ($(wc -l < v2ray_hunter.py) lines)"
          else
            echo "ERROR: v2ray_hunter.py NOT FOUND"
            echo "Files in repo:"
            find . -name "*.py" | head -20
            exit 1
          fi

      - name: Cache check
        run: |
          FORCE="${{ github.event.inputs.force_fresh }}"
          if [ "$FORCE" = "true" ]; then
            rm -f working_cache.json
            echo "Cache deleted"
          elif [ -f working_cache.json ]; then
            VER=$(python3 -c "import json; f=open('working_cache.json'); d=json.load(f); print(d[0].get('ver','old') if d else 'empty')" 2>/dev/null || echo "error")
            if [ "$VER" != "v10-aggressive" ]; then
              rm -f working_cache.json
              echo "Old cache removed: $VER"
            fi
          fi

      - name: Run Hunter
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CUSTOM_SNI: ${{ github.event.inputs.sni || '' }}
        run: |
          ARGS=""
          DRY="${{ github.event.inputs.dry_run }}"
          SNI="${{ github.event.inputs.sni }}"
          [ "$DRY" = "true" ] && ARGS="--dry-run"
          [ -n "$SNI" ] && ARGS="$ARGS --sni $SNI"
          echo "=== V2Ray AI Hunter v10 ==="
          echo "File: $(wc -l < v2ray_hunter.py) lines"
          timeout 20m python3 v2ray_hunter.py $ARGS
          RC=$?
          [ $RC -eq 124 ] && echo "Timeout - AI handled"
          exit 0

      - name: Commit and Push
        run: |
          git config user.email "v10@ai.bot"
          git config user.name "V2Ray AI v10"
          git add sub_link.txt ai_memory.json working_cache.json v2ray_hunt.log 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          STATS=$(python3 -c "import json; d=json.load(open('ai_memory.json')); print('R'+str(d.get('runs',0))+'|P'+str(d.get('total_passed',0)))" 2>/dev/null || echo "v10")
          git commit -m "v10|$(date -u +'%H:%M %d/%m')|$STATS"
          for i in 1 2 3; do
            git pull --rebase -X ours origin HEAD 2>/dev/null || true
            git push && break
            sleep $((i*3))
          done
