name: V2Ray Hunter v4 - 45min Cycle

on:
  schedule:
    - cron: '*/45 * * * *'
  workflow_dispatch:

jobs:
  hunt_and_post:
    runs-on: ubuntu-latest
    permissions:
      contents: write # إعطاء صلاحية الكتابة للمستودع

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Hunter Script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python v2ray_hunter.py

      - name: Commit & Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git pull --rebase origin main
          # السطر التالي يضيف الملفات فقط إذا كانت موجودة ولا يسبب خطأ إذا اختفت
          git add sub_link.txt v2ray_hunt.log learned_sources.json source_stats.json || echo "No files to add"
          # تنفيذ الرفع فقط إذا كان هناك تغيير حقيقي
          git commit -m "Auto-update logs and sources" || echo "No changes to commit"
          git push || echo "Push failed or nothing to push"
