name: V2Ray Hunter v4 - 45min Cycle

on:
  schedule:
    - cron: '*/45 * * * *'
  workflow_dispatch:

jobs:
  hunt_and_post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Hunter Script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_TG: "@genie_2000"
        run: python v2ray_hunter.py

      - name: Commit & Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          
          # 1. إضافة كافة الملفات الناتجة عن السكربت لتهيئة الـ Index
          git add sub_link.txt v2ray_hunt.log learned_sources.json source_stats.json || true
          
          # 2. التحقق من وجود تغييرات حقيقية قبل البدء
          if git diff --cached --quiet; then
            echo "لا توجد تغييرات جديدة لرفعها"
          else
            # 3. حفظ التغييرات محلياً أولاً لتفريغ الـ Index
            git commit -m "Update configs: $(date +'%Y-%m-%d %H:%M:%S')"
            
            # 4. جلب التحديثات من السيرفر ودمجها (حل مشكلة Exit Code 128)
            git pull --rebase origin main
            
            # 5. الرفع النهائي
            git push origin main
          fi
