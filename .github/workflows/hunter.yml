# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  🤖 V2RAY ULTIMATE HUNTER v8 — AI EDITION
#  يعمل كل 30 دقيقة | Hard Deadline 20min | ذاكرة دائمة بين الجولات
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: 🤖 V2Ray AI Hunter v8

on:
  schedule:
    - cron: '*/30 * * * *'   # كل 30 دقيقة
  workflow_dispatch:
    inputs:
      sni:
        description: 'Bug Host SNI (فارغ = AI يختار)'
        required: false
        default: ''
      dry_run:
        description: 'Dry Run (بدون نشر)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 25   # 25min < hard deadline البرنامج الداخلي (20min)

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: v2ray-pip-v8
          restore-keys: v2ray-pip-

      - name: 📦 Install
        run: pip install requests urllib3 --quiet

      - name: 🤖 Run Hunter
        env:
          BOT_TOKEN:  ${{ secrets.BOT_TOKEN }}
          CUSTOM_SNI: ${{ github.event.inputs.sni || '' }}
        run: |
          ARGS=""
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && ARGS="--dry-run"
          [ -n "${{ github.event.inputs.sni }}" ] && ARGS="$ARGS --sni ${{ github.event.inputs.sni }}"

          # حذف الكاش القديم من نسخ سابقة لضمان فحص جديد
          # (الكاش القديم يحتوي على كونفيجات Downlink=0B)
          if [ -f working_cache.json ]; then
            VER=$(python3 -c "import json; d=json.load(open('working_cache.json')); print(d[0].get('cache_ver','old') if d else 'empty')" 2>/dev/null || echo "old")
            if [ "$VER" != "v8-strict-101" ]; then
              echo "🗑️  Deleting old cache (ver=$VER) — forcing fresh scan"
              rm -f working_cache.json
            fi
          fi

          echo "🚀 V2Ray AI Hunter v8 | dry=${{ github.event.inputs.dry_run || 'false' }}"
          timeout 22m python v2ray_hunter.py $ARGS || echo "⏰ timeout — normal exit"

      - name: 💾 Commit & Push
        run: |
          git config user.email "v2ray-ai@bot.local"
          git config user.name  "V2Ray AI Bot"
          git add sub_link.txt ai_memory.json v2ray_hunt.log 2>/dev/null || true
          # working_cache.json يُحفظ محلياً فقط — لا يُرفع للريبو (منع توزيع كاش فاشل)
          git add working_cache.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "✅ Nothing to commit"; exit 0
          fi
          git commit -m "🤖 v8 | $(date -u +'%H:%M UTC %d/%m')"
          for i in 1 2 3; do
            git pull --rebase -X ours origin HEAD 2>/dev/null || true
            git push && { echo "✅ Pushed"; break; }
            sleep $((i*4))
          done
